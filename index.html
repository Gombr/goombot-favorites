<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Favorites Editor</title>
<style>
  :root{
    --bg: #14161b;
    --panel: #1b1e25;
    --panel-2: #21242c;
    --border: #2b2f3a;
    --text: #edeef2;
    --muted: #8b8fa3;
    --accent: #e8b34c;
    --accent-ink: #2a1d05;
    --focus: #e8b34c;

    --c-common:  #c9cdd6;
    --c-uncommon:#3ddc71;
    --c-rare:    #5b8dff;
    --c-ultra:   #b56bff;
    --c-legend:  #ffa943;

    --radius: 10px;
    --radius-lg: 16px;
  }

  *{ box-sizing: border-box; }
  html{ color-scheme: dark; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", system-ui, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a{ color: inherit; }

  ::selection{ background: var(--accent); color: var(--accent-ink); }

  /* ---------- Banner ---------- */
  .banner{
    background: #3a2a12;
    border-bottom: 1px solid #6b4a1a;
    color: #ffd28a;
    font-size: 13.5px;
    padding: 10px 20px;
    text-align: center;
  }
  .banner button{
    background:none; border:none; color:#ffd28a; text-decoration: underline;
    cursor:pointer; font-size: 13.5px; margin-left: 8px;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position: sticky; top:0; z-index: 20;
    background: rgba(20,22,27,.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .topbar-inner{
    max-width: 1180px; margin: 0 auto;
    display:flex; align-items:center; gap: 18px;
    padding: 14px 20px;
    flex-wrap: wrap;
  }
  .brand{ display:flex; align-items:center; gap:8px; }
  .brand-mark{
    display:inline-flex; align-items:center; justify-content:center;
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(155deg, var(--accent), #b9832a);
    color: #241905; font-weight: 900; font-size: 15px;
  }
  .brand h1{
    font-size: 19px; font-weight: 800; letter-spacing: -0.02em;
    margin:0; white-space:nowrap;
  }
  .brand-accent{ color: var(--accent); }

  .stats{
    font-variant-numeric: tabular-nums;
    font-size: 13.5px; color: var(--muted);
    white-space: nowrap;
    padding: 6px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .stats b{ color: var(--text); font-weight: 700; }

  .search-wrap{ flex: 1 1 220px; min-width: 160px; }
  #searchInput{
    width:100%; padding: 9px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  #searchInput:focus{ border-color: var(--focus); box-shadow: 0 0 0 3px rgba(232,179,76,.15); }
  #searchInput::placeholder{ color: var(--muted); }

  .actions{ display:flex; gap:8px; flex-wrap: wrap; }
  .btn{
    border-radius: 999px; border: 1px solid var(--border);
    padding: 9px 16px; font-size: 13.5px; font-weight: 600;
    cursor:pointer; white-space:nowrap;
    transition: transform .08s ease, filter .12s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{ background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .btn-primary:hover{ filter: brightness(1.08); }
  .btn-ghost{ background: var(--panel); color: var(--text); }
  .btn-ghost:hover{ background: var(--panel-2); }
  .btn-mini{
    background:none; border:none; color: var(--muted);
    font-size: 12px; cursor:pointer; text-decoration: underline;
    padding: 0;
  }
  .btn-mini:hover{ color: var(--text); }

  /* ---------- Load panel ---------- */
  .load-panel{
    max-width: 1180px; margin: 0 auto;
    padding: 0 20px 16px;
    display:flex; gap: 10px; align-items:flex-start; flex-wrap: wrap;
  }
  #loadInput{
    flex: 1 1 320px;
    min-height: 42px;
    resize: vertical;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 12.5px;
    padding: 10px 12px;
  }
  .load-status{ font-size: 12.5px; color: var(--muted); align-self:center; }
  .load-status.ok{ color: var(--c-uncommon); }
  .load-status.err{ color: #ff6b6b; }

  /* ---------- Layout ---------- */
  .layout{
    max-width: 1180px; margin: 0 auto;
    display:flex; gap: 26px;
    padding: 22px 20px 60px;
    align-items: flex-start;
  }

  .railnav{
    position: sticky; top: 84px;
    display:flex; flex-direction:column; gap:6px;
    width: 190px; flex-shrink:0;
  }
  .rail-tab{
    display:flex; flex-direction:column; gap:6px;
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--panel);
    cursor:pointer;
    text-align:left;
  }
  .rail-tab:hover{ background: var(--panel-2); }
  .rail-tab .rail-top{ display:flex; justify-content:space-between; align-items:center; font-size: 13px; font-weight:700; }
  .rail-tab .rail-count{ font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .rail-fill-track{ height:4px; border-radius:2px; background:#0d0f13; overflow:hidden; }
  .rail-fill{ height:100%; border-radius:2px; }

  .content{ flex:1; min-width:0; display:flex; flex-direction:column; gap: 28px; }

  .section{ scroll-margin-top: 90px; }
  .section-head{
    display:flex; align-items:baseline; gap:10px;
    padding-left: 14px;
    border-left: 4px solid var(--rarity-color, var(--accent));
    margin-bottom: 12px;
  }
  .section-head h2{ font-size: 16.5px; margin:0; letter-spacing: -0.01em; }
  .section-head .section-count{ font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .section-head .section-tools{ margin-left:auto; display:flex; gap:10px; }

  .card-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }
  .card-row{
    display:flex; align-items:center; gap:10px;
    padding: 9px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor:pointer;
    user-select:none;
  }
  .card-row:hover{ background: var(--panel-2); border-color: #3a3f4d; }
  .card-row.checked{ border-color: var(--rarity-color, var(--accent)); background: #23262f; }
  .card-row input{ accent-color: var(--rarity-color, var(--accent)); width:16px; height:16px; flex-shrink:0; pointer-events:none; }
  .card-row span{ font-size: 13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card-row.hidden{ display:none; }
  .section.hidden{ display:none; }

  /* ---------- Footer ---------- */
  .foot{
    max-width: 1180px; margin: 0 auto;
    padding: 0 20px 50px;
    color: var(--muted); font-size: 13px; line-height:1.6;
  }
  .foot code{
    background: var(--panel); border:1px solid var(--border);
    padding: 1px 6px; border-radius:5px; font-size: 12.5px;
  }

  /* ---------- Toast ---------- */
  #toast{
    position: fixed; bottom: 22px; left:50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: var(--accent-ink);
    padding: 10px 18px; border-radius: 999px; font-weight:700; font-size: 13.5px;
    opacity:0; pointer-events:none; transition: opacity .18s ease, transform .18s ease;
    z-index: 50;
  }
  #toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 760px){
    .layout{ flex-direction:column; padding-top: 10px; }
    .railnav{
      position: sticky; top: 0px; z-index: 15;
      flex-direction:row; width:100%; overflow-x:auto;
      background: var(--bg); padding: 10px 0; margin-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .rail-tab{ flex-shrink:0; min-width: 130px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>
<body>

  <div id="banner" class="banner" hidden></div>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">◈</span>
        <h1>Favorites<span class="brand-accent">.</span></h1>
      </div>
      <div class="stats"><b id="favCount">0</b> / <span id="totalCount">0</span> favorited</div>
      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="Search cards…" autocomplete="off">
      </div>
      <div class="actions">
        <button id="exportBtn" class="btn btn-primary">Copy Export Code</button>
        <button id="loadToggleBtn" class="btn btn-ghost">Load Code</button>
      </div>
    </div>
    <div id="loadPanel" class="load-panel" hidden>
      <textarea id="loadInput" placeholder="Paste your code from Discord here…" rows="1"></textarea>
      <button id="loadApplyBtn" class="btn btn-primary">Load</button>
      <span id="loadStatus" class="load-status"></span>
    </div>
  </header>

  <div class="layout">
    <nav class="railnav" id="railnav"></nav>
    <main class="content" id="content"></main>
  </div>

  <footer class="foot">
    <p>Check the cards you want favorited, then tap <strong>Copy Export Code</strong> and run <code>/favorite import</code> in Discord with the copied code. Favoriting here doesn't require owning the card.</p>
  </footer>

  <div id="toast"></div>

},{"n":"Chomp Call","r":"Uncommon"},{"n":"Chrome Dino","r":"Uncommon"},{"n":"Matt","r":"Uncommon"},{"n":"Meet n Huh","r":"Uncommon"},{"n":"Wii Fit Trainer","r":"Uncommon"},{"n":"Battletoads","r":"Uncommon"},{"n":"Club Penguin","r":"Uncommon"},{"n":"Monita","r":"Uncommon"},{"n":"QWOP","r":"Uncommon"},{"n":"Purple Pikmin","r":"Uncommon"},{"n":"White Pikmin","r":"Uncommon"},{"n":"Mudkip","r":"Uncommon"},{"n":"Pooka","r":"Uncommon"},{"n":"Tails","r":"Uncommon"},{"n":"Marie","r":"Uncommon"},{"n":"Line Piece","r":"Uncommon"},{"n":"Lloyd","r":"Uncommon"},{"n":"Ghost T","r":"Uncommon"},{"n":"Grubba","r":"Uncommon"},{"n":"Jabble","r":"Uncommon"},{"n":"Dunban","r":"Uncommon"},{"n":"Sharla","r":"Uncommon"},{"n":"Morshu","r":"Uncommon"}]
;

  const RARITY_ORDER = ["Common", "Uncommon", "Rare", "Ultra Rare", "Legendary"];
  const RARITY_CLASS = {
    "Common": "common", "Uncommon": "uncommon", "Rare": "rare",
    "Ultra Rare": "ultra", "Legendary": "legend"
  };
  const RARITY_VAR = {
    "Common": "--c-common", "Uncommon": "--c-uncommon", "Rare": "--c-rare",
    "Ultra Rare": "--c-ultra", "Legendary": "--c-legend"
  };

  // ---------------------------------------------------------------------
  // Encode/decode — must stay byte-identical to the bot's index.js copy
  // (computeFavoriteChecksum / encodeFavoritesCode / decodeFavoritesCode).
  // ---------------------------------------------------------------------
  function computeChecksum(list){
    let hash = 0;
    const str = list.map(c => c.n).join("|");
    for (let i = 0; i < str.length; i++){
      hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
    }
    return list.length.toString(36) + "-" + hash.toString(36);
  }

  function bytesToBase64Url(bytes){
    let binary = "";
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  function base64UrlToBytes(b64url){
    let b64 = b64url.replace(/-/g, "+").replace(/_/g, "/");
    while (b64.length % 4) b64 += "=";
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  function encodeFavoritesCode(favoritedSet){
    const bytes = new Uint8Array(Math.ceil(CARD_DATA.length / 8));
    CARD_DATA.forEach((c, i) => {
      if (favoritedSet.has(c.n)) bytes[i >> 3] |= (1 << (i % 8));
    });
    const checksum = computeChecksum(CARD_DATA);
    return checksum + "." + bytesToBase64Url(bytes);
  }

  function decodeFavoritesCode(code){
    if (typeof code !== "string" || !code.includes(".")) return { error: "malformed" };
    const dot = code.indexOf(".");
    const checksum = code.slice(0, dot).trim();
    const b64 = code.slice(dot + 1).trim();
    const expected = computeChecksum(CARD_DATA);
    if (checksum !== expected) return { error: "outdated" };
    let bytes;
    try { bytes = base64UrlToBytes(b64); } catch(e) { return { error: "malformed" }; }
    const names = [];
    CARD_DATA.forEach((c, i) => {
      const byte = bytes[i >> 3] || 0;
      if (byte & (1 << (i % 8))) names.push(c.n);
    });
    return { names };
  }

  // ---------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------
  const favorited = new Set();
  const byRarity = {};
  RARITY_ORDER.forEach(r => byRarity[r] = []);
  CARD_DATA.forEach(c => { (byRarity[c.r] = byRarity[c.r] || []).push(c); });
  RARITY_ORDER.forEach(r => byRarity[r].sort((a, b) => a.n.localeCompare(b.n)));

  const rowEls = new Map();   // name -> row element
  const checkboxEls = new Map(); // name -> checkbox element
  const railFillEls = {};    // rarity -> fill element
  const railCountEls = {};   // rarity -> count text element
  const sectionEls = {};     // rarity -> section element
  const sectionCountEls = {}; // rarity -> header count element

  // ---------------------------------------------------------------------
  // Render
  // ---------------------------------------------------------------------
  const railnav = document.getElementById("railnav");
  const content = document.getElementById("content");

  RARITY_ORDER.forEach(rarity => {
    const cards = byRarity[rarity] || [];
    if (cards.length === 0) return;
    const cls = RARITY_CLASS[rarity];
    const colorVar = `var(${RARITY_VAR[rarity]})`;

    // Rail tab
    const tab = document.createElement("button");
    tab.className = "rail-tab";
    tab.type = "button";
    tab.innerHTML = `
      <div class="rail-top">
        <span>${rarity}</span>
        <span class="rail-count" data-role="count">0/${cards.length}</span>
      </div>
      <div class="rail-fill-track"><div class="rail-fill" data-role="fill" style="width:0%;background:${colorVar}"></div></div>
    `;
    tab.addEventListener("click", () => {
      document.getElementById("section-" + cls).scrollIntoView({ behavior: "smooth", block: "start" });
    });
    railnav.appendChild(tab);
    railFillEls[rarity] = tab.querySelector('[data-role="fill"]');
    railCountEls[rarity] = tab.querySelector('[data-role="count"]');

    // Section
    const section = document.createElement("section");
    section.className = "section";
    section.id = "section-" + cls;
    section.style.setProperty("--rarity-color", colorVar);

    section.innerHTML = `
      <div class="section-head">
        <h2>${rarity}</h2>
        <span class="section-count" data-role="scount">0/${cards.length}</span>
        <div class="section-tools">
          <button class="btn-mini" data-role="selall">select all</button>
          <button class="btn-mini" data-role="clearall">clear</button>
        </div>
      </div>
      <div class="card-grid" data-role="grid"></div>
    `;
    sectionEls[rarity] = section;
    sectionCountEls[rarity] = section.querySelector('[data-role="scount"]');

    const grid = section.querySelector('[data-role="grid"]');
    cards.forEach(c => {
      const row = document.createElement("label");
      row.className = "card-row";
      row.dataset.name = c.n.toLowerCase();
      row.innerHTML = `<input type="checkbox"><span></span>`;
      row.querySelector("span").textContent = c.n;
      const checkbox = row.querySelector("input");

      row.addEventListener("click", (e) => {
        e.preventDefault();
        setFavorited(c.n, !favorited.has(c.n));
      });

      grid.appendChild(row);
      rowEls.set(c.n, row);
      checkboxEls.set(c.n, checkbox);
    });

    section.querySelector('[data-role="selall"]').addEventListener("click", () => {
      cards.forEach(c => { if (!rowEls.get(c.n).classList.contains("hidden")) setFavorited(c.n, true, true); });
      refreshCounts();
    });
    section.querySelector('[data-role="clearall"]').addEventListener("click", () => {
      cards.forEach(c => { if (!rowEls.get(c.n).classList.contains("hidden")) setFavorited(c.n, false, true); });
      refreshCounts();
    });

    content.appendChild(section);
  });

  document.getElementById("totalCount").textContent = CARD_DATA.length;

  function setFavorited(name, isFav, skipRefresh){
    if (isFav) favorited.add(name); else favorited.delete(name);
    const row = rowEls.get(name);
    const checkbox = checkboxEls.get(name);
    if (row && checkbox){
      checkbox.checked = isFav;
      row.classList.toggle("checked", isFav);
    }
    if (!skipRefresh) refreshCounts();
  }

  function refreshCounts(){
    document.getElementById("favCount").textContent = favorited.size;
    RARITY_ORDER.forEach(rarity => {
      const cards = byRarity[rarity] || [];
      if (cards.length === 0) return;
      const count = cards.filter(c => favorited.has(c.n)).length;
      const pct = cards.length ? Math.round((count / cards.length) * 100) : 0;
      railCountEls[rarity].textContent = `${count}/${cards.length}`;
      railFillEls[rarity].style.width = pct + "%";
      sectionCountEls[rarity].textContent = `${count}/${cards.length}`;
    });
  }

  // ---------------------------------------------------------------------
  // Search
  // ---------------------------------------------------------------------
  document.getElementById("searchInput").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    RARITY_ORDER.forEach(rarity => {
      const cards = byRarity[rarity] || [];
      if (cards.length === 0) return;
      let visibleCount = 0;
      cards.forEach(c => {
        const row = rowEls.get(c.n);
        const match = !q || row.dataset.name.includes(q);
        row.classList.toggle("hidden", !match);
        if (match) visibleCount++;
      });
      sectionEls[rarity].classList.toggle("hidden", visibleCount === 0);
    });
  });

  // ---------------------------------------------------------------------
  // Export
  // ---------------------------------------------------------------------
  const toastEl = document.getElementById("toast");
  let toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2200);
  }

  document.getElementById("exportBtn").addEventListener("click", async () => {
    const code = encodeFavoritesCode(favorited);
    try {
      await navigator.clipboard.writeText(code);
      showToast("Copied! Paste it into /favorite import in Discord.");
    } catch(e) {
      window.prompt("Copy this code:", code);
    }
  });

  // ---------------------------------------------------------------------
  // Load code (manual)
  // ---------------------------------------------------------------------
  const loadPanel = document.getElementById("loadPanel");
  const loadInput = document.getElementById("loadInput");
  const loadStatus = document.getElementById("loadStatus");

  document.getElementById("loadToggleBtn").addEventListener("click", () => {
    loadPanel.hidden = !loadPanel.hidden;
    if (!loadPanel.hidden) loadInput.focus();
  });

  document.getElementById("loadApplyBtn").addEventListener("click", () => {
    applyCode(loadInput.value.trim(), loadStatus);
  });

  function applyCode(code, statusEl){
    if (!code){
      statusEl.textContent = "Paste a code first.";
      statusEl.className = "load-status err";
      return;
    }
    const result = decodeFavoritesCode(code);
    if (result.error === "outdated"){
      statusEl.textContent = "This code doesn't match this page's card list. Ask the bot owner to update the site, or re-export a fresh code.";
      statusEl.className = "load-status err";
      return;
    }
    if (result.error){
      statusEl.textContent = "That code doesn't look valid.";
      statusEl.className = "load-status err";
      return;
    }
    favorited.clear();
    rowEls.forEach((row, name) => setFavorited(name, false, true));
    result.names.forEach(n => setFavorited(n, true, true));
    refreshCounts();
    statusEl.textContent = `Loaded ${result.names.length} favorite${result.names.length === 1 ? "" : "s"}.`;
    statusEl.className = "load-status ok";
  }

  // ---------------------------------------------------------------------
  // Initial load from URL hash
  // ---------------------------------------------------------------------
  const banner = document.getElementById("banner");
  const hash = decodeURIComponent(location.hash.replace(/^#/, ""));
  if (hash){
    const result = decodeFavoritesCode(hash);
    if (result.error === "outdated"){
      banner.hidden = false;
      banner.innerHTML = "This link's card list doesn't match this page's — favorites weren't preloaded. You can still edit and export from scratch. <button id=\"dismissBanner\">Dismiss</button>";
      document.getElementById("dismissBanner").addEventListener("click", () => banner.hidden = true);
    } else if (result.error){
      banner.hidden = false;
      banner.innerHTML = "This link's code looked invalid, so nothing was preloaded. <button id=\"dismissBanner\">Dismiss</button>";
      document.getElementById("dismissBanner").addEventListener("click", () => banner.hidden = true);
    } else {
      result.names.forEach(n => setFavorited(n, true, true));
    }
  }

  refreshCounts();
})();
</script>
